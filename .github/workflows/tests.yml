name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version:  '3.12'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: pip install -r requirements.txt -q

    - name: Create CI config
      run: |
        cat > config.json << 'EOF'
        {
            "data_folder":       "tests/fixtures",
            "hdf5_file":         "meld_dataset.h5",
            "model_save_path":   "tests/fixtures/best_model.pt",
            "plots_save_path":   "tests/fixtures/",
            "dataset":           "meld",
            "audio_dim":         74,
            "vision_dim":        1404,
            "text_dim":          1024,
            "seq_len":           300,
            "max_text_len":      128,
            "d_model":           128,
            "n_heads":           4,
            "enc_layers":        2,
            "fuse_layers":       2,
            "dropout":           0.1,
            "batch_size":        4,
            "num_epochs":        2,
            "learning_rate":     1e-4,
            "weight_decay":      1e-2,
            "train_ratio":       0.8,
            "val_ratio":         0.1,
            "seed":              42
        }
        EOF

    - name: Create test fixtures
      run: PYTHONPATH=. python tests/create_test_fixtures.py

    - name: Run pytest
      run: pytest tests/ -v --ignore=tests/test_pipeline.py